<body>

<button onclick="ir()">Ir al contenido</button>

<script>

const silabas=[
"ba","be","bi","bo","bu",
"ca","ce","ci","co","cu",
"da","de","di","do","du",
"fa","fe","fi","fo","fu",
"ga","ge","gi","go","gu",
"la","le","li","lo","lu",
"ma","me","mi","mo","mu",
"na","ne","ni","no","nu",
"ra","re","ri","ro","ru",
"sa","se","si","so","su",
"ta","te","ti","to","tu",
"va","ve","vi","vo","vu"
];

function generarNombre(){

let palabra="";

for(let i=0;i<4;i++){

palabra+=silabas[Math.floor(Math.random()*silabas.length)];

}

return palabra;

}

function ir(){

const slug=generarNombre();

window.location.href="https://videyy-siix.pages.dev/"+slug;

}

</script>
